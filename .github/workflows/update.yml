name: Refresh free models

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-free-models
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Refresh public provider data
        id: refresh
        shell: bash
        run: |
          set +e
          python -m freeapis update
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Verify generated files
        run: python -m freeapis check

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/models.json README.md README.zh-CN.md
          if git diff --cached --quiet; then
            echo "No model changes."
            exit 0
          fi
          git commit -m "chore(data): refresh free models [skip ci]"
          git push

      - name: Report partial provider failure
        if: steps.refresh.outputs.exit_code != '0'
        run: exit 1
